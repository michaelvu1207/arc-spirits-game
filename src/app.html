<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
		/>
		<meta name="theme-color" content="#050310" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		<!-- PWA / installable app shell -->
		<link rel="manifest" href="/manifest.json" />
		<link rel="icon" href="/favicon.png" />
		<link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Arc Spirits" />

		<!-- Paint the brand void immediately so launch/first paint isn't a white flash. -->
		<style>
			html,
			body {
				background-color: #050310;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="tap">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
